<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Colorization - Slides</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .slides-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
            text-align: center;
        }
        .slides-header {
            margin-bottom: 30px;
        }
        .slides-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .slides-header p {
            color: var(--color-text-secondary);
        }
        .slide-viewer {
            position: relative;
            background: var(--color-card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px var(--color-shadow);
            margin-bottom: 20px;
        }
        .slide-display {
            width: 100%;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }
        .slide-display img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }
        .slide-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: var(--color-card-bg);
        }
        .slide-btn {
            background: var(--color-accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .slide-btn:hover {
            opacity: 0.8;
        }
        .slide-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .slide-counter {
            font-size: 1rem;
            color: var(--color-text-secondary);
        }
        .slide-thumbnails {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        .slide-thumb {
            width: 120px;
            height: 70px;
            object-fit: contain;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s;
            background: white;
        }
        .slide-thumb:hover {
            border-color: var(--color-accent);
        }
        .slide-thumb.active {
            border-color: var(--color-accent);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--color-accent);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Hongming Zhang</a>
            <div class="nav-toggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="applications.html">Applications</a>
                <a href="publications.html">Publications</a>
                <a href="services.html">Services</a>
                <a href="misc.html">Misc</a>
                <button class="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="slides-container">
        <div class="slides-header">
            <h1>Automatic Colorization</h1>
            <p>Project Presentation Slides</p>
        </div>

        <div class="slide-viewer">
            <div class="slide-display">
                <img id="currentSlide" src="" alt="Slide">
            </div>
            <div class="slide-controls">
                <button class="slide-btn" id="prevBtn" onclick="prevSlide()">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <span class="slide-counter" id="slideCounter">1 / 19</span>
                <button class="slide-btn" id="nextBtn" onclick="nextSlide()">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div class="slide-thumbnails" id="thumbnails"></div>

        <a href="applications.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Applications
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
    <script>
        var totalSlides = 19;
        var currentSlide = 1;

        function loadSlide(n) {
            if (n < 1) n = 1;
            if (n > totalSlides) n = totalSlides;
            currentSlide = n;
            
            var img = document.getElementById('currentSlide');
            img.src = 'images/colorization_slides/slide_' + String(n).padStart(2, '0') + '.png';
            img.alt = 'Slide ' + n;
            
            document.getElementById('slideCounter').textContent = n + ' / ' + totalSlides;
            document.getElementById('prevBtn').disabled = (n === 1);
            document.getElementById('nextBtn').disabled = (n === totalSlides);
            
            var thumbs = document.querySelectorAll('.slide-thumb');
            thumbs.forEach(function(t, i) {
                t.classList.toggle('active', i + 1 === n);
            });
        }

        function prevSlide() {
            loadSlide(currentSlide - 1);
        }

        function nextSlide() {
            loadSlide(currentSlide + 1);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'Escape') window.location.href = 'applications.html';
        });

        window.addEventListener('load', function() {
            var container = document.getElementById('thumbnails');
            var html = '';
            for (var i = 1; i <= totalSlides; i++) {
                var src = 'images/colorization_slides/slide_' + String(i).padStart(2, '0') + '.png';
                html += '<img class="slide-thumb" src="' + src + '" alt="Slide ' + i + '" onclick="loadSlide(' + i + ')">';
            }
            container.innerHTML = html;
            loadSlide(1);
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
